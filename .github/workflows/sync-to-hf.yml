name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Setup Git LFS
        run: git lfs install

      - name: Remove binary files from git history
        run: |
          git filter-branch --force --index-filter \
            "git rm --cached --ignore-unmatch System_Architecture.png image.png" \
            --prune-empty --tag-name-filter cat -- --all

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push -f https://shery0099x:$HF_TOKEN@huggingface.co/spaces/shery0099x/10-Pearls-Lahore-Aqi-Predictor main
